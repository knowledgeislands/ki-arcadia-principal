<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Islands — Site Structure</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    background-color: #f4f4f2;
    background-image:
      linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.07) 1px, transparent 1px);
    background-size: 22px 22px;
    padding: 28px 28px 20px;
  }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  th, td {
    border: 1.5px solid #1a1a1a; vertical-align: top;
    background: white; padding: 5px 9px; line-height: 1.4;
  }
  th { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:#555; background:#fafafa; }
  th .lnum  { display:block; font-size:10px; color:#aaa; font-weight:600; margin-bottom:1px; }
  th .lname { display:block; font-weight:700; font-size:13px; color:#1a1a1a; text-transform:none; letter-spacing:0; }
  .col-l1{width:10%;} .col-l2{width:10%;} .col-l3{width:14%;} .col-l4{width:55%;} .col-review{width:11%;}
  .vm { vertical-align:middle !important; }
  .c-fill{background:#dbeafe !important;} .c-fill2{background:#eff6ff !important;}
  .s-fill{background:#dcfce7 !important;} .s-fill2{background:#f0fdf4 !important;}
  .a-fill{background:#fef3c7 !important;} .a-fill2{background:#fffbeb !important;}
  .c-ink{color:#1d4ed8;} .s-ink{color:#15803d;} .a-ink{color:#b45309;}
  .act-title{font-weight:700;font-size:14px;display:block;}
  .act-q{font-size:11px;font-style:italic;color:#888;margin-top:4px;display:block;}
  .ch-name{font-weight:700;font-size:13px;display:block;}
  .ch-q{font-size:10px;font-style:italic;color:#999;margin-top:3px;display:block;}
  td.sec       { font-size:13px; color:#1a1a1a; }
  td.sec-blank { background:#fafafa !important; }
  .tag{display:inline-block;font-size:10px;border-radius:3px;padding:1px 5px;margin-left:6px;font-weight:600;vertical-align:middle;}
  .t-reveal{background:#fef3c7;color:#b45309;border:1px solid #fcd34d;}
  .t-new   {background:#f0fdf4;color:#15803d;border:1px solid #86efac;}
  .t-setup {background:#f9fafb;color:#9ca3af;border:1px solid #e5e7eb;}
  .t-gap   {background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;}
  .t-todo  {background:#f9fafb;color:#b0b7c3;border:1px solid #e5e7eb;}
  .path    { display:block; font-size:10px; color:#bbb; margin-top:2px; font-family:monospace; }
  .child     { display:block; font-size:10px; color:#94a3b8; margin-top:1px; font-family:monospace; padding-left:8px; }
  .child::before     { content:"↳ "; color:#cbd5e1; }
  .child-divider { display:block; height:1px; background:#f0f0f0; margin:4px 0 2px; }
  td.rv-ns  { font-size:11px; color:#9ca3af; background:#fafafa !important; vertical-align:middle; text-align:center; }
  td.rv-flag{ font-size:11px; color:#b45309; background:#fef3c7 !important; vertical-align:middle; text-align:center; font-weight:600; }
  td.rv-done{ font-size:11px; color:#15803d; background:#dcfce7 !important; vertical-align:middle; text-align:center; font-weight:600; }
  .legend{margin-top:14px;display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#666;}
  .legend-item{display:flex;align-items:center;gap:5px;}
  .legend-swatch{width:11px;height:11px;border-radius:2px;border:1px solid #ccc;flex-shrink:0;}
</style>
</head>
<body>

<table>
  <thead>
    <tr>
      <th class="col-l1"><span class="lnum">Level 1</span><span class="lname">Premise</span></th>
      <th class="col-l2"><span class="lnum">Level 2</span><span class="lname">Acts</span></th>
      <th class="col-l3"><span class="lnum">Level 3</span><span class="lname">Chapters</span></th>

      <th class="col-review"><span class="lnum">Content</span><span class="lname">Review</span></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#fffbeb;border-color:#fcd34d;"></div>intro</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#f9fafb;border-color:#e5e7eb;"></div>setup beat / todo</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#f0fdf4;border-color:#86efac;"></div>new section</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#fef2f2;border-color:#fecaca;"></div>contextualisation gap</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#fafafa;border-color:#ddd;"></div>placeholder</div>
  <div class="legend-item" style="border-left:1px solid #ddd;padding-left:16px;margin-left:4px;">review:</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#fef3c7;border-color:#fcd34d;"></div>flag</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#dcfce7;border-color:#86efac;"></div>done</div>
  <div class="legend-item" style="border-left:1px solid #ddd;padding-left:16px;margin-left:4px;color:#94a3b8;font-family:monospace;font-size:10px;">↳ child notes</div>

// ---------------------------------------------------------------------------
// RENDER
// ---------------------------------------------------------------------------

const tagMap = {
  reveal: { label: "★ reveal", cls: "t-reveal" },
  new:    { label: "new",      cls: "t-new"    },
  setup:  { label: "setup",    cls: "t-setup"  },
  gap:    { label: "gap",      cls: "t-gap"    },
  todo:   { label: "todo",     cls: "t-todo"   }
};

const reviewMap = {
  ns:   { cls: "rv-ns",   label: "–"   },
  flag: { cls: "rv-flag", label: "⚑"   },
  done: { cls: "rv-done", label: "✓"   }
};

const colorMap = {
  c: { fill: "c-fill", fill2: "c-fill2", ink: "c-ink" },
  s: { fill: "s-fill", fill2: "s-fill2", ink: "s-ink" },
  a: { fill: "a-fill", fill2: "a-fill2", ink: "a-ink" }
};

function countSections(act) {
  return act.chapters.reduce((n, ch) => n + ch.sections.length, 0);
}

function buildTable() {
  const totalRows = data.acts.reduce((n, act) => n + countSections(act), 0);
  const rows = [];
  let firstRow = true;

  for (const act of data.acts) {
    const actRows = countSections(act);
    const col = colorMap[act.color];
    let firstActRow = true;

    for (const chapter of act.chapters) {
      let firstChRow = true;

      for (const sec of chapter.sections) {
        const isBlank = sec.title === "";
        let cells = "";

        // Premise — first row only
        if (firstRow) {
          cells += `<td rowspan="${totalRows}" class="vm" style="text-align:center;color:#777;font-size:10.5px;line-height:1.75;font-style:italic;padding:12px 10px;">${data.premise}</td>`;
          firstRow = false;
        }

        // Act — first row of act
        if (firstActRow) {
          cells += `<td rowspan="${actRows}" class="vm ${col.fill}" style="text-align:center;"><span class="act-title ${col.ink}">${act.title}</span><span class="act-q">${act.question}</span></td>`;
          firstActRow = false;
        }

        // Chapter — first row of chapter
        if (firstChRow) {
          cells += `<td rowspan="${chapter.sections.length}" class="vm ${col.fill2}" style="text-align:center;"><span class="ch-name ${col.ink}">${chapter.name}</span><span class="ch-q">${chapter.question}</span></td>`;
          firstChRow = false;
        }

        // Section
        let content = "";
        if (!isBlank) {
          content += sec.title;
          for (const t of (sec.tags || [])) {
            const tm = tagMap[t];
            if (tm) content += ` <span class="tag ${tm.cls}">${tm.label}</span>`;
          }
          if (sec.path) content += `<span class="path">${sec.path}</span>`;
          if (sec.sources && sec.sources.length > 0) {
            content += `<span class="child-divider"></span>`;
            for (const child of sec.sources) {
              content += `<span class="child">${child}</span>`;
            }
          }
        }
        cells += `<td class="${isBlank ? "sec-blank" : "sec"}">${content}</td>`;

        // Review
        const rm = isBlank ? { cls: "rv-ns", label: "" } : (reviewMap[sec.review] || reviewMap.ns);
        cells += `<td class="${rm.cls}">${rm.label}</td>`;

        rows.push(`<tr>${cells}</tr>`);
      }
    }
  }

  document.getElementById("tbody").innerHTML = rows.join("\n");
}

buildTable();
</script>
</body>
</html>

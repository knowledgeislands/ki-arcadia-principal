<script>
// Module-level cache so it survives sidebar re-focus
const CACHE_TTL = 5 * 60 * 1000;
let _cache = null, _cacheTime = 0;
const getCached = () => (_cache && (Date.now() - _cacheTime) < CACHE_TTL) ? _cache : null;
const setCache  = d => { _cache = d; _cacheTime = Date.now(); };

(async () => {
  const ISSUES_TOOL   = 'mcp__2f942765-ab41-48d3-b003-c35feba6e11f__list_issues';
  const PROJECTS_TOOL = 'mcp__2f942765-ab41-48d3-b003-c35feba6e11f__list_projects';
  const PRIORITY_ORDER = [1, 2, 3, 4, 0];
  const PRIORITY_META = {
    1: { key: 'urgent', label: 'Urgent' }, 2: { key: 'high',   label: 'High' },
    3: { key: 'normal', label: 'Normal' }, 4: { key: 'low',    label: 'Low' },
    0: { key: 'none',   label: 'No priority' },
  };
  const OPEN_TYPES = new Set(['backlog', 'unstarted', 'started', 'triage']);
  const STALE_DAYS = 14;
  const UNASSIGNED_KEY = '__unassigned__';
  const NO_PROJECT_KEY = '__no_project__';

  const $ = (sel) => document.querySelector(sel);
  const tracker = $('#tracker');

  const state = {
    issues: [], projectsById: new Map(),
    teamsMap: new Map(), assigneesMap: new Map(), statusesMap: new Map(),
    activeTeams: new Set(), activeAssignees: new Set(), activeStatuses: new Set(),
    searchTerm: '', viewMode: 'project',
  };
  const STATUS_TYPE_ORDER = { started: 0, unstarted: 1, triage: 2, backlog: 3 };

  function parse(res) {
    if (!res) return {};
    if (res.structuredContent && typeof res.structuredContent === 'object') return res.structuredContent;
    const t = res.content && res.content[0] && res.content[0].text;
    if (!t) return {};
    try { return JSON.parse(t); } catch (e) { return {}; }
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function initials(name) {
    if (!name) return '?';
    const parts = String(name).split('@')[0].replace(/[._-]+/g,' ').trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return '?';
    if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
  }
  function priorityValue(issue) {
    if (!issue.priority) return 0;
    if (typeof issue.priority === 'number') return issue.priority;
    if (typeof issue.priority.value === 'number') return issue.priority.value;
    return 0;
  }
  function isStale(issue) {
    if (!issue.updatedAt) return false;
    const then = new Date(issue.updatedAt).getTime();
    if (isNaN(then)) return false;
    return (Date.now() - then) / 86400000 > STALE_DAYS;
  }
  function formatRelative(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    if (isNaN(diff)) return '';
    const mins = Math.round(diff/60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins+'m ago';
    const hrs = Math.round(mins/60);
    if (hrs < 24) return hrs+'h ago';
    const days = Math.round(hrs/24);
    if (days < 14) return days+'d ago';
    const wks = Math.round(days/7);
    if (wks < 8) return wks+'w ago';
    return Math.round(days/30)+'mo ago';
  }
  function computeProgress(project) {
    if (!project) return null;
    const startISO = project.startDate || project.startedAt, targetISO = project.targetDate;
    if (!startISO || !targetISO) return null;
    const start = new Date(startISO).getTime(), target = new Date(targetISO).getTime(), now = Date.now();
    if (isNaN(start)||isNaN(target)||target<=start) return null;
    const pct = Math.max(0,Math.min(100,Math.round(((now-start)/(target-start))*100)));
    const daysLeft = Math.round((target-now)/86400000);
    let variant = 'normal', label;
    if (now > target) { variant='over'; label=`${Math.abs(daysLeft)}d past target · ${pct}%`; }
    else if (daysLeft <= 14) { variant='close'; label=`${daysLeft}d to target · ${pct}%`; }
    else { label=`${daysLeft}d to target · ${pct}%`; }
    return { pct, label, variant };
  }

  // --- Skeleton ---------------------------------------------------------------
  function renderSkeleton() {
    const statSkel = Array(8).fill(0).map((_,i) => `
      <div class="skel-stat">
        <div class="skel" style="width:${28+i*4}px;height:20px;margin-bottom:4px"></div>
        <div class="skel" style="width:50px;height:9px"></div>
      </div>`).join('');
    $('#summary').innerHTML = statSkel;

    const issueSkel = Array(3).fill(0).map((_,j) => `
      <div class="skel-issue">
        <span class="skel" style="width:48px;height:11px"></span>
        <span class="skel" style="width:${60+j*10}%;height:12px"></span>
        <span class="skel" style="width:80px;height:18px;border-radius:999px"></span>
      </div>`).join('');

    return Array(3).fill(0).map((_,i) => `
      <div class="skel-project">
        <div class="skel-project-head">
          <span class="skel" style="width:${100+i*30}px;height:13px"></span>
          <span class="skel" style="width:60px;height:12px;margin-left:auto"></span>
        </div>
        <div class="skel-project-body">${issueSkel}</div>
      </div>`).join('');
  }

  function showBadge(fromCache) {
    const metaEl = $('#meta');
    if (!metaEl) return;
    const badge = fromCache
      ? `<span class="cache-badge">⚡ from cache · fetched ${Math.round((Date.now()-_cacheTime)/1000)}s ago</span>`
      : `<span class="cache-badge live">↻ live</span>`;
    if (!document.getElementById('badge-span')) {
      const span = document.createElement('span');
      span.id = 'badge-span';
      metaEl.appendChild(span);
    }
    document.getElementById('badge-span').innerHTML = ' ' + badge;
  }

  // --- Issue render -----------------------------------------------------------
  function renderIssue(i) {
    const url=i.url||'', title=escapeHtml(i.title||'(untitled)'), id=escapeHtml(i.id||'');
    const team = i.team ? `<span class="badge team">${escapeHtml(i.team)}</span>` : '';
    const statusBadge = i.status && OPEN_TYPES.has(i.statusType) ? `<span class="badge status" data-type="${escapeHtml(i.statusType)}">${escapeHtml(i.status)}</span>` : '';
    const staleBadge  = isStale(i) ? `<span class="badge stale" title="Not updated in ${STALE_DAYS}+ days">Stale</span>` : '';
    const assignee    = i.assignee ? `<span class="avatar" title="${escapeHtml(i.assignee)}">${escapeHtml(initials(i.assignee))}</span>` : `<span class="avatar unassigned" title="Unassigned">-</span>`;
    const updated     = i.updatedAt ? `<span class="badge" title="Updated ${escapeHtml(i.updatedAt)}">${escapeHtml(formatRelative(i.updatedAt))}</span>` : '';
    const assigneeKey = i.assigneeId||(i.assignee?i.assignee:UNASSIGNED_KEY);
    const searchBlob  = `${i.id||''} ${i.title||''} ${i.team||''} ${i.project||''} ${i.assignee||''}`.toLowerCase();
    return `<a class="issue" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer"
       data-team="${escapeHtml(i.teamId||'')}" data-assignee="${escapeHtml(assigneeKey)}"
       data-status="${escapeHtml(i.status||'')}" data-search="${escapeHtml(searchBlob)}">
      <span class="id">${id}</span><span class="title">${title}</span>
      <span class="right">${staleBadge}${statusBadge}${team}${updated}${assignee}</span>
    </a>`;
  }

  function renderProjectCard(p) {
    const buckets = PRIORITY_ORDER.map(pv=>({pv,issues:p.issues.filter(i=>priorityValue(i)===pv)})).filter(b=>b.issues.length>0);
    buckets.forEach(b=>b.issues.sort((a,c)=>{const aS=a.statusType==='started'?0:1,cS=c.statusType==='started'?0:1;if(aS!==cS)return aS-cS;return new Date(c.updatedAt)-new Date(a.updatedAt);}));
    const countChips = PRIORITY_ORDER.filter(pv=>p.counts[pv]>0).map(pv=>{const m=PRIORITY_META[pv];return `<span class="chip mini" title="${escapeHtml(m.label)}"><span class="pdot ${m.key}"></span> ${p.counts[pv]}</span>`;}).join('');
    const isNo = p.id===NO_PROJECT_KEY;
    let progressHTML='';
    if (!isNo) { const projData=state.projectsById.get(p.id); const prog=computeProgress(projData); if (prog) progressHTML=`<div class="progress"><div class="bar"><div class="fill ${prog.variant}" style="width:${prog.pct}%"></div></div><div class="label ${prog.variant}">${escapeHtml(prog.label)}</div></div>`; }
    return `<section class="project" data-pid="${escapeHtml(p.id)}">
      <div class="head" role="button" tabindex="0">
        <span class="arrow">▼</span>
        <span class="${isNo?'title no-project':'title'}">${escapeHtml(p.name)}</span>
        <span class="count">${countChips}<span>${p.total} issue${p.total===1?'':'s'}</span></span>
        ${progressHTML}
      </div>
      <div class="body">${buckets.map(b=>`<div class="bucket"><div class="head"><span class="pdot ${PRIORITY_META[b.pv].key}"></span> ${PRIORITY_META[b.pv].label} · ${b.issues.length}</div><div class="issues">${b.issues.map(renderIssue).join('')}</div></div>`).join('')}</div>
    </section>`;
  }

  function renderByProject() {
    const projects=new Map();
    for (const issue of state.issues) {
      const pid=issue.projectId||NO_PROJECT_KEY;
      if (!projects.has(pid)) projects.set(pid,{id:pid,name:issue.project||(pid===NO_PROJECT_KEY?'No project':'Untitled project'),issues:[]});
      projects.get(pid).issues.push(issue);
    }
    const projArr=Array.from(projects.values()).map(p=>{const counts={1:0,2:0,3:0,4:0,0:0};for(const i of p.issues)counts[priorityValue(i)]++;return{...p,counts,total:p.issues.length};});
    projArr.sort((a,b)=>{if(a.id===NO_PROJECT_KEY)return 1;if(b.id===NO_PROJECT_KEY)return -1;if(b.counts[1]!==a.counts[1])return b.counts[1]-a.counts[1];if(b.counts[2]!==a.counts[2])return b.counts[2]-a.counts[2];if(b.total!==a.total)return b.total-a.total;return a.name.localeCompare(b.name);});
    tracker.innerHTML=projArr.map(p=>renderProjectCard(p)).join('')||'<div class="empty">No open issues. Nice.</div>';
    const noProj=tracker.querySelector(`[data-pid="${NO_PROJECT_KEY}"]`);
    if (noProj) noProj.classList.add('collapsed');
    wireCollapse('.project');
  }

  function renderByPriority() {
    const byPriority=new Map();
    for (const pv of PRIORITY_ORDER) byPriority.set(pv,new Map());
    for (const issue of state.issues) {
      const pv=priorityValue(issue),pid=issue.projectId||NO_PROJECT_KEY,projMap=byPriority.get(pv);
      if (!projMap.has(pid)) projMap.set(pid,{id:pid,name:issue.project||(pid===NO_PROJECT_KEY?'No project':'Untitled project'),issues:[]});
      projMap.get(pid).issues.push(issue);
    }
    const cards=[];
    for (const pv of PRIORITY_ORDER) {
      const projMap=byPriority.get(pv),total=Array.from(projMap.values()).reduce((n,p)=>n+p.issues.length,0);
      if (!total) continue;
      const projArr=Array.from(projMap.values()).sort((a,b)=>{if(a.id===NO_PROJECT_KEY)return 1;if(b.id===NO_PROJECT_KEY)return -1;if(b.issues.length!==a.issues.length)return b.issues.length-a.issues.length;return a.name.localeCompare(b.name);});
      projArr.forEach(p=>p.issues.sort((a,c)=>{const aS=a.statusType==='started'?0:1,cS=c.statusType==='started'?0:1;if(aS!==cS)return aS-cS;return new Date(c.updatedAt)-new Date(a.updatedAt);}));
      const m=PRIORITY_META[pv];
      cards.push(`<section class="priority-card ${m.key}" data-priority="${pv}">
        <div class="head" role="button" tabindex="0"><span class="arrow">▼</span><span class="pdot ${m.key}"></span><span class="title">${escapeHtml(m.label)}</span><span class="count">${total} issue${total===1?'':'s'}</span></div>
        <div class="body">${projArr.map(p=>{const isNo=p.id===NO_PROJECT_KEY;return `<div class="project-mini" data-pid="${escapeHtml(p.id)}"><div class="head"><span class="pdot ${m.key}"></span><strong class="${isNo?'no-project':''}">${escapeHtml(p.name)}</strong><span>· ${p.issues.length}</span></div><div class="issues">${p.issues.map(renderIssue).join('')}</div></div>`;}).join('')}</div>
      </section>`);
    }
    tracker.innerHTML=cards.join('')||'<div class="empty">No open issues. Nice.</div>';
    wireCollapse('.priority-card');
  }

  function wireCollapse(sel) {
    tracker.querySelectorAll(`${sel} > .head`).forEach(head=>{
      head.addEventListener('click',()=>head.parentElement.classList.toggle('collapsed'));
      head.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();head.parentElement.classList.toggle('collapsed');}});
    });
  }

  function renderViewMode() { if (state.viewMode==='project') renderByProject(); else renderByPriority(); applyFilters(); }

  function renderSummary() {
    const issues=state.issues,total=issues.length,c={1:0,2:0,3:0,4:0,0:0};
    for (const i of issues) c[priorityValue(i)]++;
    const inProgress=issues.filter(i=>i.statusType==='started').length;
    const noProjectCount=issues.filter(i=>!i.projectId).length;
    const staleCount=issues.filter(isStale).length;
    const teamsCount=state.teamsMap.size;
    $('#summary').innerHTML=`
      <div class="stat"><div class="n">${total}</div><div class="l">Open total</div></div>
      <div class="stat urgent"><div class="n">${c[1]}</div><div class="l">Urgent</div></div>
      <div class="stat high"><div class="n">${c[2]}</div><div class="l">High</div></div>
      <div class="stat"><div class="n">${c[3]}</div><div class="l">Normal</div></div>
      <div class="stat"><div class="n">${c[4]}</div><div class="l">Low</div></div>
      <div class="stat"><div class="n">${inProgress}</div><div class="l">In progress</div></div>
      <div class="stat stale"><div class="n">${staleCount}</div><div class="l">Stale ${STALE_DAYS}d+</div></div>
      <div class="stat"><div class="n">${noProjectCount}</div><div class="l">No project</div></div>`;
    $('#meta').innerHTML=`${total} issues across ${teamsCount} team${teamsCount===1?'':'s'} · updated ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
  }

  function applyFilters() {
    tracker.querySelectorAll('.issue').forEach(el=>{
      const teamOk=!el.dataset.team||state.activeTeams.has(el.dataset.team);
      const assigneeOk=state.activeAssignees.has(el.dataset.assignee);
      const statusOk=!el.dataset.status||state.activeStatuses.has(el.dataset.status);
      const searchOk=!state.searchTerm||el.dataset.search.includes(state.searchTerm);
      el.classList.toggle('hide',!(teamOk&&assigneeOk&&statusOk&&searchOk));
    });
    ['.bucket','.project-mini','.project','.priority-card'].forEach(sel=>{
      tracker.querySelectorAll(sel).forEach(c=>c.classList.toggle('hide',c.querySelectorAll('.issue:not(.hide)').length===0));
    });
  }

  function wireTeamChips() {
    const container=$('#team-chips');
    const teams=Array.from(state.teamsMap.entries()).sort((a,b)=>a[1].name.localeCompare(b[1].name));
    const allBtn=document.createElement('button');allBtn.className='btn mini';allBtn.textContent='All';
    allBtn.addEventListener('click',()=>{state.activeTeams=new Set(state.teamsMap.keys());container.querySelectorAll('.chip[data-team-id]').forEach(c=>c.classList.add('active'));applyFilters();});
    const noneBtn=document.createElement('button');noneBtn.className='btn mini';noneBtn.textContent='None';
    noneBtn.addEventListener('click',()=>{state.activeTeams=new Set();container.querySelectorAll('.chip[data-team-id]').forEach(c=>c.classList.remove('active'));applyFilters();});
    container.appendChild(allBtn);container.appendChild(noneBtn);
    for (const [teamId,team] of teams) {
      const btn=document.createElement('span');btn.className='chip active';btn.dataset.teamId=teamId;btn.textContent=`${team.name} (${team.count})`;
      btn.addEventListener('click',()=>{if(state.activeTeams.has(teamId)){state.activeTeams.delete(teamId);btn.classList.remove('active');}else{state.activeTeams.add(teamId);btn.classList.add('active');}applyFilters();});
      container.appendChild(btn);
    }
  }

  function wireAssigneeChips() {
    const container=$('#assignee-chips');
    const entries=Array.from(state.assigneesMap.entries()).sort((a,b)=>{if(a[0]===UNASSIGNED_KEY)return 1;if(b[0]===UNASSIGNED_KEY)return -1;if(b[1].count!==a[1].count)return b[1].count-a[1].count;return a[1].name.localeCompare(b[1].name);});
    const allBtn=document.createElement('button');allBtn.className='btn mini';allBtn.textContent='All';
    allBtn.addEventListener('click',()=>{state.activeAssignees=new Set(state.assigneesMap.keys());container.querySelectorAll('.chip[data-assignee-key]').forEach(c=>c.classList.add('active'));applyFilters();});
    const noneBtn=document.createElement('button');noneBtn.className='btn mini';noneBtn.textContent='None';
    noneBtn.addEventListener('click',()=>{state.activeAssignees=new Set();container.querySelectorAll('.chip[data-assignee-key]').forEach(c=>c.classList.remove('active'));applyFilters();});
    container.appendChild(allBtn);container.appendChild(noneBtn);
    for (const [key,a] of entries) {
      const btn=document.createElement('span');btn.className='chip active';btn.dataset.assigneeKey=key;btn.textContent=`${a.name} (${a.count})`;
      btn.addEventListener('click',()=>{if(state.activeAssignees.has(key)){state.activeAssignees.delete(key);btn.classList.remove('active');}else{state.activeAssignees.add(key);btn.classList.add('active');}applyFilters();});
      container.appendChild(btn);
    }
  }

  function wireStatusChips() {
    const container=$('#status-chips');
    const entries=Array.from(state.statusesMap.entries()).sort((a,b)=>{const aO=STATUS_TYPE_ORDER[a[1].statusType]??99,bO=STATUS_TYPE_ORDER[b[1].statusType]??99;if(aO!==bO)return aO-bO;if(b[1].count!==a[1].count)return b[1].count-a[1].count;return a[1].name.localeCompare(b[1].name);});
    const allBtn=document.createElement('button');allBtn.className='btn mini';allBtn.textContent='All';
    allBtn.addEventListener('click',()=>{state.activeStatuses=new Set(state.statusesMap.keys());container.querySelectorAll('.chip[data-status-name]').forEach(c=>c.classList.add('active'));applyFilters();});
    const noneBtn=document.createElement('button');noneBtn.className='btn mini';noneBtn.textContent='None';
    noneBtn.addEventListener('click',()=>{state.activeStatuses=new Set();container.querySelectorAll('.chip[data-status-name]').forEach(c=>c.classList.remove('active'));applyFilters();});
    container.appendChild(allBtn);container.appendChild(noneBtn);
    for (const [name,s] of entries) {
      const btn=document.createElement('span');btn.className='chip active';btn.dataset.statusName=name;btn.innerHTML=`<span class="sdot" data-type="${escapeHtml(s.statusType||'')}"></span>${escapeHtml(s.name)} (${s.count})`;
      btn.addEventListener('click',()=>{if(state.activeStatuses.has(name)){state.activeStatuses.delete(name);btn.classList.remove('active');}else{state.activeStatuses.add(name);btn.classList.add('active');}applyFilters();});
      container.appendChild(btn);
    }
  }

  function wireViewToggle() {
    $('#view-toggle').querySelectorAll('.toggle-option').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if (btn.dataset.view===state.viewMode) return;
        state.viewMode=btn.dataset.view;
        $('#view-toggle').querySelectorAll('.toggle-option').forEach(b=>{const a=b.dataset.view===state.viewMode;b.classList.toggle('active',a);b.setAttribute('aria-selected',a?'true':'false');});
        renderViewMode();
      });
    });
  }

  function wireControls() {
    $('#controls').style.display='';
    wireTeamChips();wireAssigneeChips();wireStatusChips();wireViewToggle();
    $('#search').addEventListener('input',e=>{state.searchTerm=e.target.value.trim().toLowerCase();applyFilters();});
    $('#expand-all').addEventListener('click',()=>tracker.querySelectorAll('.project,.priority-card').forEach(p=>p.classList.remove('collapsed')));
    $('#collapse-all').addEventListener('click',()=>tracker.querySelectorAll('.project,.priority-card').forEach(p=>p.classList.add('collapsed')));
  }

  function buildMaps() {
    state.teamsMap.clear();state.assigneesMap.clear();state.statusesMap.clear();
    for (const i of state.issues) {
      if (i.teamId){if(!state.teamsMap.has(i.teamId))state.teamsMap.set(i.teamId,{name:i.team||i.teamId,count:0});state.teamsMap.get(i.teamId).count++;}
      const aKey=i.assigneeId||(i.assignee?i.assignee:UNASSIGNED_KEY),aName=i.assignee||(aKey===UNASSIGNED_KEY?'Unassigned':aKey);
      if(!state.assigneesMap.has(aKey))state.assigneesMap.set(aKey,{name:aName,count:0});state.assigneesMap.get(aKey).count++;
      if(i.status){if(!state.statusesMap.has(i.status))state.statusesMap.set(i.status,{name:i.status,statusType:i.statusType||'',count:0});state.statusesMap.get(i.status).count++;}
    }
    state.activeTeams=new Set(state.teamsMap.keys());
    state.activeAssignees=new Set(state.assigneesMap.keys());
    state.activeStatuses=new Set(state.statusesMap.keys());
  }

  function hydrateAndRender(fromCache) {
    buildMaps();
    renderSummary();
    renderViewMode();
    wireControls();
    showBadge(fromCache);
  }

  // --- Fetch helpers ----------------------------------------------------------
  async function fetchByState(stateType) {
    const out=[]; let cursor;
    for (let page=0;page<15;page++) {
      const args={state:stateType,limit:250,includeArchived:false,orderBy:'updatedAt'};
      if (cursor) args.cursor=cursor;
      const res=await window.cowork.callMcpTool(ISSUES_TOOL,args);
      if (res&&res.isError) throw new Error('list_issues failed for state='+stateType);
      const data=parse(res);
      if (Array.isArray(data.issues)) out.push(...data.issues);
      if (!data.hasNextPage) break;
      cursor=data.cursor;if (!cursor) break;
    }
    return out;
  }

  async function fetchAllProjects() {
    const out=[]; let cursor;
    for (let page=0;page<10;page++) {
      const args={limit:250,includeArchived:false};if (cursor) args.cursor=cursor;
      let res; try { res=await window.cowork.callMcpTool(PROJECTS_TOOL,args); } catch(e){return out;}
      if (!res||res.isError) return out;
      const data=parse(res);
      if (Array.isArray(data.projects)) out.push(...data.projects);
      if (!data.hasNextPage) break;
      cursor=data.cursor;if (!cursor) break;
    }
    return out;
  }

  // --- Boot -------------------------------------------------------------------
  const cached = getCached();
  if (cached) {
    state.issues = cached.issues;
    for (const [k,v] of cached.projectsByIdEntries) state.projectsById.set(k,v);
    hydrateAndRender(true);
    return;
  }

  // Show skeleton immediately
  tracker.innerHTML = renderSkeleton();

  try {
    const [backlog,unstarted,started,triage,projects] = await Promise.all([
      fetchByState('backlog'), fetchByState('unstarted'), fetchByState('started'),
      fetchByState('triage'), fetchAllProjects(),
    ]);
    const all = [...backlog,...unstarted,...started,...triage];
    const byId = new Map();
    for (const i of all) {
      if (!i||!i.id) continue;
      if (!OPEN_TYPES.has(i.statusType)) continue;
      if (i.archivedAt) continue;
      byId.set(i.id,i);
    }
    state.issues = Array.from(byId.values());
    for (const p of projects) { if (p&&p.id) state.projectsById.set(p.id,p); }

    setCache({ issues: state.issues, projectsByIdEntries: Array.from(state.projectsById.entries()) });
    hydrateAndRender(false);
  } catch (err) {
    tracker.innerHTML=`<div class="error">Failed to load issues: ${escapeHtml(err&&err.message||String(err))}</div>`;
    $('#meta').textContent='Error loading';
  }
})();
</script>
</body>
</html>

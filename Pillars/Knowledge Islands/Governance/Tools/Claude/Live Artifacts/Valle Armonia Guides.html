  "architecture": "# Architecture Guide\n\n> **Status:** Living document - update as the stack or infrastructure changes.\n>\n> Sections marked **[current]** describe the system as it exists today. Sections marked **[planned]** describe the target architecture being designed.\n\n## Context: Knowledge Islands\n\nThis architecture is an instance of the **Knowledge Islands** pattern (see [knowledgeislands.info](https://knowledgeislands.info/)). In that model, a Principal Knowledge Island holds the canonical, organised understanding of a subject. Satellite islands are derived, purpose-built presences - each self-contained, each drawing selectively from the Principal.\n\nThe Valle Armonia website is a **Satellite Knowledge Island**. The Principal holds the community's full knowledge. The website publishes a curated view of it. The two systems are distinct; signals pass between them through an agent (the Telegram bot) rather than through tight coupling.\n\nThis means:\n- The website can exist and function independently of the Principal\n- The Principal can grow and evolve without breaking the website\n- The agent (bot) is the only thing that needs to understand both systems\n\n---\n\n## System architecture\n\n```\n              ┌──────────────────────────────────────────────────────┐\n    ┌─────────┤          IMPORT PIPELINE  [planned]                  ├─────────┐\n    │         │   Telegram Bot · GitHub Actions                      │         │\n    ▲         │   Harvests from Principal · Fills satellite bindings │         ▼\n    │         └──────────────────────────────────────────────────────┘         │\n    │                                                                          │\n┌───┴──────────────────────────┐                     ┌─────────────────────────┴─────┐\n│  PRINCIPAL KNOWLEDGE ISLAND  │                     │  SATELLITE KNOWLEDGE ISLAND   │\n│  [planned]                   │                     │  [current]                    │\n│                              │                     │                               │\n│  Name: TBD (community        │                     │  vallearmonia-website         │\n│  to decide)                  │                     │  Site code · Templates · CSS  │\n│                              │                     │  Bindings · Content snippets  │\n│  git repo + cloud storage    │                     │  Self-contained               │\n│  Prose · Guides · Data       │                     └──────────────┬────────────────┘\n│  Governance · Community life │                                    │ push to main\n│  Community managed           │                                    ▼\n└──────────────────────────────┘                     ┌──────────────────────────────┐\n                                                     │  BUILD PIPELINE  [current]   │\n                                                     │  Cloudflare Pages CI/CD      │\n                                                     │  npm run build → dist/       │\n                                                     └──────────────┬───────────────┘\n                                                                    │ deploy to edge\n                                                                    ▼\n                                                     ┌──────────────────────────────┐\n                                                     │  LIVE SITE  [current]        │\n                                                     │  vallearmonia.com            │\n                                                     │  Cloudflare Pages            │\n                                                     └──────────────────────────────┘\n```\n\n---\n\n## The two islands\n\n### Principal Knowledge Island [planned]\n\nThe canonical home for everything the community knows and produces. Name to be decided by the community. Exists as both a **git repository** (for versioning and structure) and **cloud storage** (for easy community access and collaboration). Community members interact with it directly - reading, writing, uploading files - without any technical knowledge.\n\n| Type | Examples | Format |\n| ---- | -------- | ------ |\n| Prose content | About the community, values, practices, healing, nature | Word / Google Docs |\n| Guides | How the site works, content admin, how the site evolves | Word / Google Docs |\n| Structured data | Community stats, lot details, pricing, people | Spreadsheet |\n| Governance | Community agreements, policies, meeting notes | Word / Google Docs |\n\nThe Principal is not the website's responsibility to maintain or understand. It grows and evolves on its own terms.\n\n### Satellite Knowledge Island [current]\n\nThe website is a **satellite** - self-contained, with its own code, bindings, and content. It does not depend on the Principal to function. Content can be contributed manually (by editing files in `docs/content/` directly) until the import pipeline is in place.\n\nThe satellite holds:\n- Site code: templates, CSS, JS, Eleventy configuration\n- **Bindings**: the mapping of which content goes where (which Principal content fills which page slot)\n- **Content snippets**: the actual imported content, either hand-placed or harvested by the agent\n\nThe bindings live in the satellite, not the Principal and not the bot. The satellite defines what it needs; the agent fills it.\n\n---\n\n## Import pipeline [planned]\n\nThe agent that connects the two islands. Acts on behalf of the satellite - it knows what the satellite needs (from the bindings) and knows how to get it from the Principal.\n\n### Trigger: Telegram bot\n\nThe Telegram bot is the human-facing interface to the pipeline. Community members send files or instructions to the bot the same way they'd send a message to a contact. The bot acts on their behalf.\n\n```\nCommunity member sends .docx to Telegram bot\n  → Cloudflare Worker (webhook, ~50 lines)\n  → downloads file from Telegram API\n  → commits .docx to docs/content/source/ via GitHub API\n  → commit triggers the processing Action\n```\n\nThe bot sends a confirmation message back when the file is received and processed. This closes the loop without requiring the sender to check anything.\n\n### Processing: GitHub Actions\n\nOn receipt of a new `.docx` commit, a GitHub Action runs `scripts/import-source.ts`:\n\n1. Convert `.docx` → Markdown via `pandoc`\n2. Split on `##` headings into per-topic files\n3. Write to `docs/content/` with front matter: `source`, `imported-at`, `source-hash`, `draft: true`\n4. Diff against existing files - only update what changed\n5. Commit updated content files to the repository\n6. The commit triggers Cloudflare Pages to rebuild and redeploy the site\n\n### Content naming\n\nContent files in `docs/content/` are named by **topic**, not by page URL. The site's pages determine what they pull in; content files do not dictate page structure. Example: `communal-culture.md`, not `about.md`.\n\nA page may draw from multiple content files. A content file may be referenced by multiple pages.\n\n### Authentication\n\n| Connection | Mechanism |\n| ---------- | --------- |\n| Telegram bot → GitHub | Fine-grained GitHub token (repo-scoped) stored as Cloudflare Worker secret |\n| GitHub Action → repository | Built-in `GITHUB_TOKEN` (write access, no extra setup) |\n| GitHub Action → Drive (if needed) | Google service account JSON key stored as Actions secret |\n\n---\n\n## Stack\n\n| Layer | Technology | Version | Notes |\n| ----- | ---------- | ------- | ----- |\n| Site generator | Eleventy | ^3.1.5 | Transforms templates + data into static HTML |\n| Templates | Nunjucks | - | HTML templating language; `.njk` files in `src/` |\n| CSS | Tailwind CSS 4 | ^4.2.4 | Utility-first CSS; design tokens in `main.css` |\n| Data files | TypeScript | ^6.0.3 | `src/_data/*.ts` loaded via Node `--experimental-strip-types` |\n| Structured data | JSON5 | ^2.2.3 | `src/_data/*.json5` for human-editable data |\n| Icons | Lucide | bundled | UMD bundle vendored from `node_modules`; no CDN |\n| Linting | ESLint + Prettier | - | Code and Markdown linting |\n| Runtime | Node.js | - | No separate TypeScript compile step; strip-types only |\n\n---\n\n## Repository layout\n\n```text\nvallearmonia-website/\n├── CLAUDE.md               ← Claude working context and rules\n├── eleventy.config.ts      ← Eleventy configuration\n├── package.json            ← npm scripts and dependencies\n├── src/                    ← site source (everything Eleventy processes)\n│   ├── index.njk           ← home page template\n│   ├── content/            ← inner page templates\n│   │   ├── content.11tydata.json   ← cascaded front matter for all content pages\n│   │   ├── communal-culture.njk\n│   │   ├── healing.njk\n│   │   ├── nature.njk\n│   │   ├── sharing.njk\n│   │   ├── membership.njk\n│   │   ├── volunteers.njk\n│   │   ├── future-projects.njk\n│   │   └── contact.njk\n│   ├── _data/              ← global data files (available in all templates)\n│   │   └── site.ts         ← site config: title, description, URL, nav array\n│   ├── _includes/          ← reusable template fragments\n│   │   ├── layouts/\n│   │   │   ├── base.njk    ← root layout: nav + content slot + footer\n│   │   │   └── docs.njk    ← docs/guide page layout\n│   │   └── partials/\n│   │       ├── nav.njk     ← top navigation bar\n│   │       └── footer.njk  ← site footer\n│   └── assets/\n│       ├── css/\n│       │   ├── main.css        ← entry point; imports all other CSS files\n│       │   ├── tokens.css      ← design tokens (colours, type, spacing)\n│       │   ├── base.css        ← base element styles\n│       │   ├── layout.css      ← page layout and grid\n│       │   ├── nav.css         ← navigation styles\n│       │   ├── home.css        ← home page specific styles\n│       │   ├── components.css  ← reusable component styles\n│       │   └── docs.css        ← docs page styles\n│       ├── images/             ← static images (passthrough-copied to dist/)\n│       └── js/                 ← static JS (passthrough-copied to dist/)\n├── dist/                   ← build output (git-ignored; regenerate with npm run build)\n└── docs/                   ← process documentation, guides, change records\n    ├── content/            ← staged prose from source documents (not live pages)\n    │   └── source/         ← raw .docx source files (Import Pipeline provenance; never processed in place)\n    ├── changes/            ← change documents by status\n    ├── guides/             ← living guides (this file lives here)\n    ├── memory/             ← working memory: glossary, people, project context\n    └── processes/          ← process documentation\n```\n\n---\n\n## Build pipeline\n\n### Commands\n\n| Command | What it does |\n| ------- | ------------ |\n| `npm run dev` | Tailwind watch + Eleventy dev server (port 3000) |\n| `npm run build` | Full production build → `dist/` |\n| `npm run clean` | Wipe `dist/` |\n\n### How `npm run build` works\n\n1. Eleventy starts, loading `eleventy.config.ts` via Node `--experimental-strip-types`\n2. The `eleventy.before` hook runs Tailwind CLI to compile `src/assets/css/main.css` → `dist/assets/css/main.css --minify`\n3. Eleventy processes all `.njk`, `.md`, and `.html` files in `src/`\n4. Global data files (`src/_data/*.ts`, `src/_data/*.json5`) are loaded and made available to all templates\n5. Two HTML transforms run on every output file: **external-link-icons** (injects Lucide icon into `https://` links in prose) and **explicit-index-links** (rewrites absolute internal URLs to relative paths)\n6. Static assets are passthrough-copied; output lands in `dist/`\n\n---\n\n## Templating\n\n### Navigation\n\nThe `nav` array in `src/_data/site.ts` drives the top navigation bar. Nav items support `NavLink` (single link), `NavSeparator` (visual divider), and `NavGroupDef` (dropdown group with `groupId`, `groupName`, `groupIcon`, and items array).\n\n### Directory data files\n\n`src/content/content.11tydata.json` cascades shared front matter (e.g. `layout`) to every page in `src/content/`. This avoids repeating `layout: layouts/base.njk` in every template.\n\n---\n\n## CSS architecture\n\nTailwind CSS 4 in **CSS-first config mode** - no `tailwind.config.js`. Design tokens defined as CSS custom properties in `@layer base :root {}` within `tokens.css`, exposed to Tailwind via `@theme inline`.\n\n| File | Purpose |\n| ---- | ------- |\n| `tokens.css` | Design tokens: colours, type scale, spacing |\n| `base.css` | Base element resets and global styles |\n| `layout.css` | Page layout, grid, containers |\n| `nav.css` | Navigation component |\n| `home.css` | Home page hero and link grid |\n| `components.css` | Shared components |\n| `docs.css` | Documentation page styles |\n\nNever add ad-hoc hex values or hard-coded sizes to templates. All values must come from `tokens.css`.\n\n---\n\n## Hosting and deployment\n\n| Concern | Solution | Notes |\n| ------- | -------- | ----- |\n| Hosting | Cloudflare Pages | Static files; free tier |\n| Automated deploy | Cloudflare Pages CI/CD | Push to `main` → build → deploy; no GitHub Actions file needed |\n| Domain | `vallearmonia.com` | Registered at Spaceship; DNS delegated to Cloudflare |\n| HTTPS | Cloudflare (automatic) | Certificate issued and renewed automatically |\n| `www` redirect | Cloudflare redirect rule | `www.vallearmonia.com` → `vallearmonia.com` (301) |\n| Email forwarding | Cloudflare Email Routing | `hello@vallearmonia.com` and catch-all |\n\nBuild settings: **Build command:** `npm run build` · **Output directory:** `dist` · **Production branch:** `main`\n\n---\n\n## Key conventions\n\n- **No CDN dependencies in production.** Lucide vendored from `node_modules` into `dist/assets/js/lucide.min.js` at build time.\n- **`dist/` is git-ignored.** Never hand-edit it. Always regenerate with `npm run build`.\n- **TypeScript data files only - no separate compile step.** `--experimental-strip-types` handles type stripping at runtime.\n- **No git commands from Claude.** All version control is handled by Kit.\n- **Relative URLs throughout.** The `explicit-index-links` transform rewrites all internal absolute URLs to relative paths.",
  "content-admin": "# Content Administration Guide\n\n> This guide explains how to update the Valle Armonia website - covering both the manual process (submitting corrections and ideas) and the automated/technical process (making changes directly via the codebase). It is written for community members and contributors of all technical backgrounds.\n>\n> **Filled in by:** `site-rollout-approach` change\n\n---\n\n_Content to be added when `site-rollout-approach` rolls out._",
  "design-system": "# Design System\n\n> This guide defines the visual language of the Valle Armonia website: colour, typography, spacing, components, patterns, and voice & tone. It is the reference for anyone building or extending the site.\n>\n> **Filled in by:** `design-system` change\n\n---\n\n_Content to be added when `design-system` rolls out._",
  "evolution": "# Site Evolution\n\n> This guide describes how the Valle Armonia website grows over time - the phased approach, the criteria for moving between phases, and the community processes that govern what gets built and when.\n>\n> **Filled in by:** `site-rollout-approach` change\n\n---\n\n_Content to be added when `site-rollout-approach` rolls out._",
  "inspiration": "# Inspiration & References\n\n> This guide documents the sites, resources, and references that shaped the Valle Armonia website - its structure, design, tone, and content approach. It is a living document, added to as the site evolves.\n>\n> **Filled in by:** `initial-website-structure` change (2026-04-25)\n\n---\n\n## Primary: Alegría Village\n\n**URL:** [alegriavillage.com](https://www.alegriavillage.com/)\n\nThe closest comparable community to Valle Armonia: intentional community in Costa Rica, hybrid private-lot / communal model, similar values around sustainability and conscious living. The primary structural inspiration - the goal is to target the same structural feel as closely as possible.\n\n### Navigation structure observed\n\n| Section | Sub-pages |\n| ------- | --------- |\n| About | The Community, Our Vision, Values, Location, FAQs, Map, For Sale |\n| Visit | Webinars, Tours, Planning Your Trip |\n| Living Here | Neighborhood Plan, Shared Spaces, Infrastructure, Building Your Home, Community Governance, Schools, Living in Costa Rica |\n| Farm | About, Our Practices |\n| Residents | _(external link - residents portal)_ |\n| Contact | - |\n\n### Design patterns carried forward\n\n- Full-width hero images with overlay text and CTAs\n- Dropdown nav groupings for sections with multiple sub-pages (planned for future, kept flat initially)\n- Grid of content cards / lifestyle photography\n- Earthy, warm colour palette\n- Repeated action buttons directing toward tours, applications, contact\n- Footer with social media links\n\n### Content patterns carried forward\n\n- Community stats surfaced prominently (residents, countries, hectares) - to be added once Valle Armonia figures are confirmed\n- Sustainability described concretely, not abstractly\n- Hybrid ownership model (private lots + shared amenities) is central to the site's message\n- Application/purchase process laid out clearly for prospective residents\n\n---\n\n## Secondary: Fruit Haven\n\n**URL:** [fruithaven.land](https://fruithaven.land/)\n\nFruit-forward ecovillage in Ecuador; similar philosophy to Valle Armonia's Pura Fruta roots. Useful for supplementary structural ideas, particularly around the volunteer/visit model and the land purchase flow.\n\n### Navigation structure observed\n\n| Section | Sub-pages |\n| ------- | --------- |\n| About | About us, Our Vision, Videos |\n| Group Land Buys | Land for Sale, Developing Your Lot, FAQ |\n| Visit | Volunteer!, Rentals, Day tour |\n| Contact | - |\n| Blog | - |\n| Donate | - |\n\n### Design patterns carried forward\n\n- Donate as a standalone nav item (CB references a donation mechanism - tracked as a future nav addition)\n- Blog as a lightweight presence/news channel - tracked as a future page\n- Volunteer and Rentals treated as distinct visitor types with separate pages\n- Practical logistics given real prominence\n- Community standards stated clearly\n\n---\n\n## Future references to add\n\nAs the site develops, document additional inspirations here: photography approaches, typography sources, other community sites reviewed during design sprints.",
  "site-structure": "# Site Structure\n\n> This guide documents the Valle Armonia website's sitemap, page purposes, URL structure, and navigation rationale. It is the reference for understanding what the site contains and why it is organised the way it is.\n>\n> **Filled in by:** `initial-website-structure` change (2026-04-25)\n\n---\n\n## Current sitemap\n\nEight pages make up the initial site. All content is drawn from `docs/content/` staging files imported from the content brief (`Valle Armonia Website.docx`).\n\n| Page | URL | Template | Content source(s) | Notes |\n| ---- | --- | -------- | ----------------- | ----- |\n| Home | `/` | `src/index.njk` | Inline prose (custom hero) | Full-width hero; nav card grid planned |\n| Communal Culture | `/communal-culture/` | `src/content/communal-culture.njk` | `docs/content/communal-culture.md` | Values, culture, NVC, group dynamics |\n| Healing & Growth | `/healing/` | `src/content/healing.njk` | `docs/content/healing-inner-growth.md` | Inner growth, spiritual practice |\n| Nature & Farm | `/nature/` | `src/content/nature.njk` | `docs/content/nature-food-permaculture.md` | Jungle living, fruit forest, permaculture |\n| Sharing Resources | `/sharing/` | `src/content/sharing.njk` | `docs/content/sharing-resources.md` | Tools, transport, meals, shared labour |\n| Ownership & Membership | `/membership/` | `src/content/membership.njk` | `docs/content/ownership-membership.md` | Co-ownership model, shares, lots |\n| Volunteers & Guests | `/volunteers/` | `src/content/volunteers.njk` | `docs/content/volunteers-guests.md` | Volunteer terms, guest rates |\n| Future Projects | `/future-projects/` | `src/content/future-projects.njk` | `docs/content/future-projects.md` | Vision statement, healing centre, school |\n| Contact & Donate | `/contact/` | `src/content/contact.njk` | `docs/content/contact.md` | Placeholder - contact/donate details TBC |\n\n---\n\n## Navigation\n\nThe nav is driven by the `nav` array in `src/_data/site.ts`. // ── Markdown renderer ─────────────────────────────────────────────────────────
function mdToHtml(md) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline = s => esc(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');

  const lines = md.split('\n');
  const blocks = [];
  let i = 0;
  while (i < lines.length) {
    if (/^```/.test(lines[i])) {
      const code = []; i++;
      while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
      i++;
      blocks.push({ t:'code', text: code.join('\n') });
    } else {
      blocks.push({ t:'line', text: lines[i] }); i++;
    }
  }

  const sem = [];
  let j = 0;
  while (j < blocks.length) {
    const b = blocks[j];
    if (b.t === 'code') { sem.push(b); j++; continue; }
    const l = b.text;
    const hm = l.match(/^(#{1,6})\s+(.+)$/);
    if (hm) { sem.push({ t:'h', level: hm[1].length, text: hm[2] }); j++; continue; }
    if (/^---+$/.test(l.trim())) { sem.push({ t:'hr' }); j++; continue; }
    if (/^>/.test(l)) {
      const bq = [];
      while (j < blocks.length && blocks[j].t==='line' && /^>/.test(blocks[j].text)) { bq.push(blocks[j].text.replace(/^>\s?/,'')); j++; }
      sem.push({ t:'bq', text: bq.join('\n') }); continue;
    }
    if (/^\|/.test(l)) {
      const rows = [];
      while (j < blocks.length && blocks[j].t==='line' && /^\|/.test(blocks[j].text)) { rows.push(blocks[j].text); j++; }
      sem.push({ t:'table', rows }); continue;
    }
    if (/^[-*]\s/.test(l)) {
      const items = [];
      while (j < blocks.length && blocks[j].t==='line' && /^[-*]\s/.test(blocks[j].text)) { items.push(blocks[j].text.replace(/^[-*]\s/,'')); j++; }
      sem.push({ t:'ul', items }); continue;
    }
    if (/^\d+\.\s/.test(l)) {
      const items = [];
      while (j < blocks.length && blocks[j].t==='line' && /^\d+\.\s/.test(blocks[j].text)) { items.push(blocks[j].text.replace(/^\d+\.\s/,'')); j++; }
      sem.push({ t:'ol', items }); continue;
    }
    if (l.trim() === '') { j++; continue; }
    const para = [];
    while (j < blocks.length && blocks[j].t==='line') {
      const ll = blocks[j].text;
      if (ll.trim()==='' || /^#{1,6}\s/.test(ll) || /^---+$/.test(ll.trim()) || /^[>|]/.test(ll) || /^[-*]\s/.test(ll) || /^\d+\.\s/.test(ll) || /^```/.test(ll)) break;
      para.push(ll); j++;
    }
    if (para.length) sem.push({ t:'p', text: para.join(' ') });
  }

  let html = '';
  for (const s of sem) {
    if (s.t==='h') {
      if (s.level===1) continue;
      html += `<h${s.level}>${inline(s.text)}</h${s.level}>\n`;
    } else if (s.t==='hr') {
      html += '<hr>\n';
    } else if (s.t==='code') {
      html += `<pre><code>${esc(s.text)}</code></pre>\n`;
    } else if (s.t==='bq') {
      const inner = s.text.split('\n').map(ll=>`<p>${inline(ll)}</p>`).join('');
      html += `<blockquote>${inner}</blockquote>\n`;
    } else if (s.t==='ul') {
      html += '<ul>'+s.items.map(it=>`<li>${inline(it)}</li>`).join('')+'</ul>\n';
    } else if (s.t==='ol') {
      html += '<ol>'+s.items.map(it=>`<li>${inline(it)}</li>`).join('')+'</ol>\n';
    } else if (s.t==='table') {
      const [hdr,,...body] = s.rows;
      const ths = hdr.split('|').filter(c=>c.trim()).map(c=>`<th>${inline(c.trim())}</th>`).join('');
      const trs = body.map(r=>'<tr>'+r.split('|').filter(c=>c.trim()).map(c=>`<td>${inline(c.trim())}</td>`).join('')+'</tr>').join('');
      html += `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>\n`;
    } else if (s.t==='p') {
      html += `<p>${inline(s.text)}</p>\n`;
    }
  }
  return html;
}

// ── Parse & render ────────────────────────────────────────────────────────────
function parseGuide(slug, raw) {
  const titleM = raw.match(/^# (.+)$/m);
  const title = titleM ? titleM[1].trim() : slug;
  const fbM = raw.match(/\*\*Filled in by:\*\*\s*`([^`]+)`/);
  const filledBy = fbM ? fbM[1] : null;
  const isStub = /Content to be added/i.test(raw);
  return { slug, title, filledBy, isStub, raw };
}

const TAB = {
  'architecture':'Architecture','content-admin':'Content Admin',
  'design-system':'Design System','evolution':'Evolution',
  'inspiration':'Inspiration','site-structure':'Site Structure'
};

let guides = Object.entries(RAW).map(([slug, raw]) => parseGuide(slug, raw));
guides.sort((a,b) => { if(a.isStub!==b.isStub) return a.isStub?1:-1; return a.slug.localeCompare(b.slug); });

let active = guides[0].slug;

function renderNav() {
  document.getElementById('guide-tabs').innerHTML = guides.map(g =>
    `<button id="tab-${g.slug}" onclick="show('${g.slug}')">${TAB[g.slug]||g.title}</button>`
  ).join('');
}

function show(slug) {
  active = slug;
  document.querySelectorAll('#guide-tabs button').forEach(b => b.classList.toggle('active', b.id==='tab-'+slug));
  const g = guides.find(x=>x.slug===slug);
  if (!g) return;
  const pill = g.isStub ? `<span class="status-pill stub">Stub</span>` : `<span class="status-pill live">Live</span>`;
  const fb = g.filledBy ? `<div class="filled-by">Filled in by <code>${g.filledBy}</code></div>` : '';
  const body = g.isStub
    ? `<div class="stub-notice"><strong>Content coming soon</strong>This guide will be filled in when the <code>${g.filledBy||'upcoming'}</code> change rolls out.</div>`
    : `<div class="prose">${mdToHtml(g.raw.replace(/^# .+\n?/,''))}</div>`;
  document.getElementById('guide-main').innerHTML =
    `<div class="guide-meta"><span class="guide-title">${g.title}</span>${pill}</div>${fb}${body}`;
}

renderNav();
show(active);
</script>
